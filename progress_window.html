<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>New Music Research</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Michroma&family=Orbitron:wght@500;700;900&family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#000; --abyss:#050508; --surface:#111118; --elevated:#1a1a24; --raised:#222230;
    --text:#e8e8f0; --muted:#8888a0; --ghost:#555570;
    --cyan:#00f0ff; --cyan-glow:rgba(0,240,255,.16);
    --violet:#c084fc; --violet-glow:rgba(192,132,252,.16);
    --magenta:#ff4fd8;
    --ok:#00ff88; --warn:#f5a623; --err:#ff3366;
    --track:#222230;
  }
  *{box-sizing:border-box;}
  html,body{width:100%; height:100%;}
  html{font-size:19px;}
  body{
    margin:0; width:100vw; height:100vh; min-height:100vh; overflow:hidden;
    display:flex; flex-direction:column;
    background:var(--abyss); color:var(--text);
    font-family:'DM Sans',system-ui,sans-serif; font-size:1.05rem; line-height:1.6;
    -webkit-font-smoothing:antialiased;
    position:relative;
  }
  /* ambient depth */
  .bg{position:fixed; inset:0; z-index:0; pointer-events:none;}
  .bg.mesh{
    background:
      radial-gradient(ellipse at 18% 12%, rgba(0,240,255,.10) 0%, transparent 55%),
      radial-gradient(ellipse at 85% 20%, rgba(192,132,252,.09) 0%, transparent 55%),
      radial-gradient(ellipse at 60% 100%, rgba(255,79,216,.06) 0%, transparent 55%),
      var(--abyss);
  }
  .bg.grid{
    background-image:
      linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
    background-size:44px 44px;
    mask-image:radial-gradient(ellipse at 50% 35%, #000 0%, transparent 80%);
    -webkit-mask-image:radial-gradient(ellipse at 50% 35%, #000 0%, transparent 80%);
  }
  .wrap{position:relative; z-index:1; padding:46px 70px 44px; width:100%; max-width:1680px;
    margin:0 auto; flex:1 1 auto; min-height:0; display:flex; flex-direction:column;}

  /* header */
  header{display:flex; align-items:flex-start; justify-content:space-between; gap:20px;}
  .title{
    font-family:'Michroma',sans-serif; font-size:2.2rem; letter-spacing:.16em;
    color:var(--cyan); margin:0;
    text-shadow:0 0 10px var(--cyan-glow), 0 0 34px var(--cyan-glow);
  }
  .subtitle{font-size:.92rem; letter-spacing:.22em; color:var(--violet); margin-top:8px; text-transform:uppercase;}
  .live{display:flex; align-items:center; gap:9px; font-family:'JetBrains Mono',monospace;
    font-size:.78rem; letter-spacing:.14em; color:var(--muted); text-transform:uppercase; white-space:nowrap; padding-top:6px;}
  .live .dot{width:9px; height:9px; border-radius:50%; background:var(--ok); box-shadow:0 0 10px var(--ok); animation:pulse 1.6s ease-in-out infinite;}

  /* phase rail */
  .phases{display:grid; grid-template-columns:repeat(3,1fr); gap:20px; margin:40px 0 30px;}
  .phase{
    border:1px solid rgba(255,255,255,.07); border-radius:14px; padding:22px 26px;
    background:rgba(255,255,255,.025); backdrop-filter:blur(14px);
    display:flex; align-items:center; gap:14px; transition:border-color .3s, box-shadow .3s, background .3s;
  }
  .phase .idx{
    font-family:'Orbitron',sans-serif; font-weight:700; font-size:1rem;
    width:34px; height:34px; flex:0 0 34px; border-radius:9px;
    display:flex; align-items:center; justify-content:center;
    background:var(--raised); color:var(--muted); border:1px solid rgba(255,255,255,.08);
  }
  .phase .lbl{font-family:'JetBrains Mono',monospace; font-size:.82rem; letter-spacing:.1em; color:var(--muted); text-transform:uppercase;}
  .phase.active{border-color:var(--cyan); background:rgba(0,240,255,.06); box-shadow:0 0 22px var(--cyan-glow), inset 0 0 18px rgba(0,240,255,.05);}
  .phase.active .idx{background:var(--cyan); color:#001016; border-color:var(--cyan); box-shadow:0 0 14px var(--cyan-glow);}
  .phase.active .lbl{color:var(--text);}
  .phase.done .idx{background:var(--ok); color:#00140a; border-color:var(--ok);}
  .phase.done .lbl{color:var(--text);}

  /* overall progress */
  .panel{
    flex:1 1 auto; min-height:0; display:flex; flex-direction:column;
    border:1px solid rgba(255,255,255,.08); border-radius:18px; padding:32px 40px;
    background:rgba(255,255,255,.03); backdrop-filter:blur(22px) saturate(160%);
    box-shadow:0 8px 32px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.04);
  }
  .row{display:flex; align-items:baseline; justify-content:space-between; gap:16px;}
  .row .k{font-family:'JetBrains Mono',monospace; font-size:.82rem; letter-spacing:.14em; color:var(--muted); text-transform:uppercase;}
  .counts{font-family:'Orbitron',sans-serif; font-variant-numeric:tabular-nums; color:var(--text);}
  .counts .n{color:var(--cyan); font-weight:700;}
  .pct{font-family:'Orbitron',sans-serif; font-weight:900; font-size:2.1rem; color:var(--cyan);
    font-variant-numeric:tabular-nums; text-shadow:0 0 16px var(--cyan-glow); line-height:1; font-size:3rem;}
  .bar{position:relative; height:20px; border-radius:8px; background:var(--track);
    overflow:hidden; margin-top:16px; border:1px solid rgba(255,255,255,.05);}
  .bar .fill{position:absolute; inset:0 auto 0 0; width:0%;
    background:linear-gradient(90deg, var(--cyan), var(--violet));
    box-shadow:0 0 16px var(--cyan-glow); border-radius:8px; transition:width .45s ease;}
  .bar .fill::after{content:''; position:absolute; inset:0;
    background:linear-gradient(90deg, transparent, rgba(255,255,255,.35), transparent);
    animation:sheen 2.2s linear infinite;}
  .bar.indeterminate .fill{width:38%; animation:slide 1.5s ease-in-out infinite; transition:none;}

  /* current activity */
  .current{margin-top:18px; display:flex; align-items:center; gap:16px;}
  .current .spin{width:13px; height:13px; flex:0 0 13px; border-radius:50%;
    background:var(--cyan); box-shadow:0 0 12px var(--cyan); animation:pulse 1.3s ease-in-out infinite;}
  .current .name{font-weight:700; color:var(--text); font-size:1.4rem;}
  .current .detail{font-family:'JetBrains Mono',monospace; font-size:.92rem; color:var(--muted);}
  .current .name:empty::before{content:'Standing by'; color:var(--ghost);}

  /* log */
  .log{margin-top:26px; flex:1 1 auto; min-height:0; display:flex; flex-direction:column;}
  .log h2{font-family:'JetBrains Mono',monospace; font-size:.78rem; letter-spacing:.18em;
    color:var(--ghost); text-transform:uppercase; margin:0 0 10px;}
  .log ul{list-style:none; margin:0; padding:0; flex:1 1 auto; min-height:0; max-height:none; overflow-y:auto;
    font-family:'JetBrains Mono',monospace; font-size:1rem;}
  .log li{padding:5px 0; color:var(--muted); border-bottom:1px solid rgba(255,255,255,.04);
    display:flex; gap:10px; align-items:baseline;}
  .log li::before{content:'\203A'; color:var(--cyan); flex:0 0 auto;}
  .log li:last-child{color:var(--text);}

  /* stats */
  .stats{display:flex; gap:30px; margin-top:18px; flex-wrap:wrap;}
  .stat .v{font-family:'Orbitron',sans-serif; font-weight:700; font-size:2rem; color:var(--violet); font-variant-numeric:tabular-nums;}
  .stat .l{font-family:'JetBrains Mono',monospace; font-size:.72rem; letter-spacing:.14em; color:var(--muted); text-transform:uppercase;}

  /* done overlay */
  .done-card{margin-top:22px; border:1px solid rgba(0,255,136,.4); border-radius:18px; padding:22px 26px;
    background:rgba(0,255,136,.05); box-shadow:0 0 30px rgba(0,255,136,.12); display:none;}
  .done-card.show{display:block; animation:rise .5s ease-out both;}
  .done-card.fail{border-color:rgba(255,51,102,.45); background:rgba(255,51,102,.06); box-shadow:0 0 30px rgba(255,51,102,.14);}
  .done-head{display:flex; align-items:center; gap:14px;}
  .done-head .mark{font-family:'Orbitron',sans-serif; font-weight:900; font-size:1.3rem; color:var(--ok);}
  .done-card.fail .mark{color:var(--err);}
  .done-head .msg{font-size:1.08rem; color:var(--text); font-weight:500;}
  .actions{margin-top:18px; display:flex; gap:12px;}
  button{font-family:'JetBrains Mono',monospace; font-size:.9rem; letter-spacing:.06em; font-weight:600;
    padding:11px 26px; border-radius:10px; cursor:pointer; transition:all .2s ease;
    background:transparent; border:1px solid var(--cyan); color:var(--cyan); box-shadow:0 0 14px var(--cyan-glow);}
  button:hover{background:var(--cyan-glow); box-shadow:0 0 24px var(--cyan-glow);}
  button:focus-visible{outline:2px solid var(--cyan); outline-offset:2px;}

  ::-webkit-scrollbar{width:7px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1); border-radius:4px;}
  ::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.2);}

  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
  @keyframes sheen{from{transform:translateX(-100%);}to{transform:translateX(100%);}}
  @keyframes slide{0%{left:-40%;}100%{left:100%;}}
  @keyframes rise{from{opacity:0; transform:translateY(14px);}to{opacity:1; transform:translateY(0);}}
  @media (prefers-reduced-motion: reduce){
    *{animation:none !important; transition:none !important;}
  }
</style>
</head>
<body data-kmwindow="SCREEN(Main,Left),SCREEN(Main,Top),SCREEN(Main,Width),SCREEN(Main,Height)">
  <div class="bg mesh"></div>
  <div class="bg grid"></div>
  <div class="wrap">
    <header>
      <div>
        <h1 class="title">DX&nbsp;BROADCAST&nbsp;SYSTEM</h1>
        <div class="subtitle">New Music Research &middot; Tidal &rarr; Spotify</div>
      </div>
      <div class="live"><span class="dot"></span><span id="liveLabel">Live</span></div>
    </header>

    <div class="phases" id="phases">
      <div class="phase" data-p="1"><div class="idx">1</div><div class="lbl">Scrape Tidal</div></div>
      <div class="phase" data-p="2"><div class="idx">2</div><div class="lbl">Dedupe</div></div>
      <div class="phase" data-p="3"><div class="idx">3</div><div class="lbl">Export Spotify</div></div>
    </div>

    <div class="panel">
      <div class="row">
        <span class="k" id="overallLabel">Standing by</span>
        <span class="counts"><span class="n" id="oCur">0</span> / <span id="oTot">0</span></span>
      </div>
      <div class="row" style="margin-top:6px;">
        <span></span>
        <span class="pct" id="pct">0%</span>
      </div>
      <div class="bar indeterminate" id="bar"><div class="fill" id="fill"></div></div>

      <div class="current">
        <span class="spin" id="spin"></span>
        <span class="name" id="curName"></span>
        <span class="detail" id="curDetail"></span>
      </div>

      <div class="stats" id="stats"></div>

      <div class="log">
        <h2>Activity</h2>
        <ul id="log"></ul>
      </div>

      <div class="done-card" id="doneCard">
        <div class="done-head"><span class="mark" id="doneMark">&check;</span><span class="msg" id="doneMsg"></span></div>
        <div class="actions"><button id="closeBtn" type="button">Close</button></div>
      </div>
    </div>
  </div>

<script>
  (function(){
    var KM = window.KeyboardMaestro;
    function fit(){ try { if (KM && KM.ResizeWindow) KM.ResizeWindow('0,0,' + screen.availWidth + ',' + screen.availHeight); } catch(e){} }
    fit();
    window.addEventListener('load', fit);
    setTimeout(fit, 120); setTimeout(fit, 500);

    var els = {
      phases: document.querySelectorAll('#phases .phase'),
      overallLabel: document.getElementById('overallLabel'),
      oCur: document.getElementById('oCur'), oTot: document.getElementById('oTot'),
      pct: document.getElementById('pct'), bar: document.getElementById('bar'),
      fill: document.getElementById('fill'), spin: document.getElementById('spin'),
      curName: document.getElementById('curName'), curDetail: document.getElementById('curDetail'),
      stats: document.getElementById('stats'), log: document.getElementById('log'),
      doneCard: document.getElementById('doneCard'), doneMark: document.getElementById('doneMark'),
      doneMsg: document.getElementById('doneMsg'), liveLabel: document.getElementById('liveLabel')
    };
    var STATUS_COLOR = {opening:'var(--violet)', scanning:'var(--cyan)', working:'var(--cyan)',
                        exporting:'var(--magenta)', done:'var(--ok)', idle:'var(--ghost)'};

    function close(){ try{ KM.Cancel(); }catch(e){ try{ window.close(); }catch(e2){} } }
    document.getElementById('closeBtn').addEventListener('click', close);

    function renderLog(lines){
      if(!lines) return;
      if(els.log.childElementCount === lines.length) return;
      els.log.innerHTML = '';
      lines.forEach(function(line){
        var li = document.createElement('li');
        li.textContent = line;
        els.log.appendChild(li);
      });
      els.log.scrollTop = els.log.scrollHeight;
    }

    function renderStats(stats){
      if(!stats){ els.stats.innerHTML=''; return; }
      var order = [['unique','Unique'],['recent','Recent'],['duplicates','Duplicates']];
      var html = '';
      order.forEach(function(pair){
        if(stats[pair[0]] != null){
          html += '<div class="stat"><div class="v">'+stats[pair[0]]+'</div><div class="l">'+pair[1]+'</div></div>';
        }
      });
      els.stats.innerHTML = html;
    }

    var finished = false;
    function render(s){
      // phases
      els.phases.forEach(function(el){
        var p = parseInt(el.getAttribute('data-p'),10);
        el.classList.toggle('active', p === s.phase && !s.done);
        el.classList.toggle('done', p < s.phase || (s.done && s.ok));
      });
      // overall
      var o = s.overall || {current:0,total:0,label:''};
      els.overallLabel.textContent = o.label || s.phaseLabel || 'Working';
      els.oCur.textContent = o.current||0;
      els.oTot.textContent = o.total||0;
      var hasTotal = (o.total||0) > 0;
      var pct = hasTotal ? Math.round((o.current/o.total)*100) : 0;
      if(s.done && s.ok) pct = 100;
      if(hasTotal || (s.done && s.ok)){
        els.bar.classList.remove('indeterminate');
        els.fill.style.width = pct + '%';
        els.pct.textContent = pct + '%';
      } else {
        els.bar.classList.add('indeterminate');
        els.pct.textContent = '•••';
      }
      // current
      var c = s.current || {name:'',detail:'',status:'idle'};
      els.curName.textContent = c.name || '';
      els.curDetail.textContent = c.detail || '';
      var col = STATUS_COLOR[c.status] || 'var(--cyan)';
      els.spin.style.background = col; els.spin.style.boxShadow = '0 0 12px ' + col;
      renderStats(s.stats);
      renderLog(s.log);
      // done
      if(s.done && !finished){
        finished = true;
        els.doneCard.classList.add('show');
        els.doneCard.classList.toggle('fail', !s.ok);
        els.doneMark.innerHTML = s.ok ? '&check;' : '&times;';
        els.doneMsg.textContent = s.message || (s.ok ? 'Complete' : 'Finished with errors');
        els.liveLabel.textContent = 'Complete';
        els.spin.style.animation = 'none';
        setTimeout(close, 8000);
      }
    }

    var last = '';
    function poll(){
      try{
        var raw = KM ? KM.GetVariable('NMRProgress') : '';
        if(raw && raw !== last){
          last = raw;
          render(JSON.parse(raw));
        }
      }catch(e){}
    }
    poll();
    setInterval(poll, 300);
  })();
</script>
</body>
</html>
